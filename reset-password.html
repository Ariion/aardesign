<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAR Design — Nouveau mot de passe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:   #f0ede8;
  --ink:  #111010;
  --mid:  #888580;
  --line: rgba(17,16,16,.1);
  --gold: #b8945a;
  --red:  #c0392b;
  --E:    cubic-bezier(.16,1,.3,1);
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(var(--line) 1px,transparent 1px), linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 75%);
}
.card {
  position: relative; z-index: 1;
  width: 420px; max-width: 92vw;
  background: rgba(240,237,232,.95); border: 1px solid var(--line);
  padding: 3.25rem 3rem;
  box-shadow: 0 24px 60px rgba(17,16,16,.07);
  animation: cardIn .75s var(--E) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
.card::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.logo-wrap { text-align: center; margin-bottom: 2.5rem; }
.logo-wrap img { height: 26px; display: inline-block; }

.card-title {
  font-family: 'DM Serif Display', serif; font-size: 2rem;
  font-weight: 400; line-height: 1; text-align: center; margin-bottom: .35rem;
}
.card-title em { font-style: italic; color: var(--mid); }
.card-sub { font-size: .65rem; letter-spacing: .18em; color: var(--mid); text-align: center; margin-bottom: 2.5rem; }

.field { margin-bottom: 1.35rem; }
.field label { display: block; font-size: .58rem; letter-spacing: .24em; text-transform: uppercase; color: var(--mid); margin-bottom: .5rem; }
.field-wrap { position: relative; }
.field input {
  width: 100%; background: rgba(17,16,16,.03);
  border: none; border-bottom: 1px solid rgba(17,16,16,.18);
  color: var(--ink); padding: .8rem 2.5rem .8rem 0;
  font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 300;
  outline: none; transition: border-color .25s;
}
.field input:focus { border-bottom-color: var(--ink); }
.field input::placeholder { color: rgba(136,133,128,.4); }
.eye-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--mid); cursor: pointer; font-size: .85rem; transition: color .2s; }
.eye-btn:hover { color: var(--ink); }

/* Password strength */
.pwd-strength { margin-top: .5rem; display: flex; gap: 3px; }
.pwd-bar { flex: 1; height: 2px; background: var(--line); transition: background .3s; }
.pwd-bar.weak   { background: var(--red); }
.pwd-bar.medium { background: var(--gold); }
.pwd-bar.strong { background: #27ae60; }
.pwd-hint { font-size: .62rem; color: var(--mid); margin-top: .35rem; }

.submit-btn {
  width: 100%; padding: 1rem; margin-top: .5rem;
  background: var(--ink); color: var(--bg);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  font-size: .7rem; letter-spacing: .24em; text-transform: uppercase;
  border: none; cursor: pointer; position: relative; overflow: hidden;
  transition: box-shadow .35s, transform .2s var(--E);
}
.submit-btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,.06); transform: translateX(-101%); transition: transform .5s var(--E); }
.submit-btn:hover::after { transform: translateX(0); }
.submit-btn:hover { box-shadow: 0 10px 32px rgba(17,16,16,.2); transform: translateY(-1px); }
.submit-btn:disabled { opacity: .45; pointer-events: none; }

.status {
  margin-top: 1rem; padding: .65rem .9rem; font-size: .75rem;
  text-align: center; opacity: 0; transition: opacity .3s; border-left: 2px solid transparent;
}
.status.show { opacity: 1; }
.status.err  { border-left-color: var(--red); color: var(--red); background: rgba(192,57,43,.04); }
.status.ok   { border-left-color: #27ae60; color: #27ae60; background: rgba(39,174,96,.04); }

.back-link { display: block; text-align: center; margin-top: 2rem; font-size: .65rem; letter-spacing: .14em; color: var(--mid); text-decoration: none; transition: color .2s; }
.back-link:hover { color: var(--ink); }

/* Loading state */
.loading-screen {
  position: fixed; inset: 0; background: var(--bg); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1.5rem;
}
.loading-screen img { height: 28px; opacity: .5; }
.loading-bar-w { width: 80px; height: 1px; background: var(--line); overflow: hidden; }
.loading-bar { height: 100%; background: var(--ink); animation: loadPulse 1.2s ease-in-out infinite; }
@keyframes loadPulse { 0%,100%{transform:translateX(-100%)} 50%{transform:translateX(100%)} }

.dots { display: inline-flex; gap: 4px; vertical-align: middle; }
.dots span { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: dot .8s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .3s; }
@keyframes dot { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<!-- Loading while Supabase processes the token -->
<div class="loading-screen" id="loadingScreen">
  <img src="assets/Logo-Aardesign-Long.png" alt="AAR Design">
  <div class="loading-bar-w"><div class="loading-bar"></div></div>
</div>

<div class="card" id="mainCard" style="display:none">
  <div class="logo-wrap">
    <img src="assets/Logo-Aardesign-Long.png" alt="AAR Design">
  </div>
  <h1 class="card-title">Nouveau <em>mot de passe</em></h1>
  <p class="card-sub" id="cardSub">Choisissez un mot de passe sécurisé</p>

  <div id="formContent">
    <div class="field">
      <label>Nouveau mot de passe</label>
      <div class="field-wrap">
        <input type="password" id="pwd1" placeholder="••••••••••••" oninput="checkStrength()">
        <button class="eye-btn" onclick="toggle('pwd1',this)" type="button">👁</button>
      </div>
      <div class="pwd-strength">
        <div class="pwd-bar" id="bar1"></div>
        <div class="pwd-bar" id="bar2"></div>
        <div class="pwd-bar" id="bar3"></div>
        <div class="pwd-bar" id="bar4"></div>
      </div>
      <div class="pwd-hint" id="pwdHint">Minimum 8 caractères</div>
    </div>

    <div class="field">
      <label>Confirmer le mot de passe</label>
      <div class="field-wrap">
        <input type="password" id="pwd2" placeholder="••••••••••••">
        <button class="eye-btn" onclick="toggle('pwd2',this)" type="button">👁</button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="updatePassword()">
      <span id="btnLabel">Enregistrer le mot de passe →</span>
    </button>
  </div>

  <div class="status" id="status"></div>
  <a href="/login" class="back-link" id="backLink">← Retour à la connexion</a>
</div>

<script>
const SUPABASE_URL      = 'https://XXXXXXXXXXXXXXXX.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ── Intercept the recovery token from URL hash ──────────────
// Supabase puts #access_token=...&type=recovery in the URL
window.addEventListener('load', async () => {
  const hash = window.location.hash

  // If no hash at all → probably landed here by mistake
  if (!hash) {
    showError('Lien invalide. Veuillez demander un nouveau lien de réinitialisation.')
    showCard()
    return
  }

  // Let Supabase parse the hash and set the session
  const { data, error } = await sb.auth.getSession()

  if (error || !data.session) {
    // Try to exchange the token manually
    const params = new URLSearchParams(hash.replace('#', ''))
    const accessToken  = params.get('access_token')
    const refreshToken = params.get('refresh_token')
    const type         = params.get('type')

    if (type === 'recovery' && accessToken) {
      const { error: setErr } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken })
      if (setErr) {
        showError('Lien expiré ou invalide. Demandez un nouveau lien.')
        hideForm()
      }
    } else {
      showError('Lien invalide. Demandez un nouveau lien de réinitialisation.')
      hideForm()
    }
  }

  // Also listen for PASSWORD_RECOVERY event (some Supabase versions use this)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      // Good — user is authenticated via recovery link, show form
    }
  })

  showCard()
})

function showCard() {
  document.getElementById('loadingScreen').style.display = 'none'
  document.getElementById('mainCard').style.display = 'block'
}
function hideForm() {
  document.getElementById('formContent').style.display = 'none'
  document.getElementById('backLink').textContent = '← Retour à la connexion'
}

async function updatePassword() {
  const pwd1 = document.getElementById('pwd1').value
  const pwd2 = document.getElementById('pwd2').value
  const btn  = document.getElementById('submitBtn')
  const lbl  = document.getElementById('btnLabel')

  if (!pwd1) { showError('Veuillez saisir un mot de passe.'); return }
  if (pwd1.length < 8) { showError('Minimum 8 caractères.'); return }
  if (pwd1 !== pwd2) { showError('Les mots de passe ne correspondent pas.'); return }

  btn.disabled = true
  lbl.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>'
  document.getElementById('status').className = 'status'

  const { error } = await sb.auth.updateUser({ password: pwd1 })

  if (error) {
    btn.disabled = false
    lbl.textContent = 'Enregistrer le mot de passe →'
    showError('Erreur : ' + error.message)
    return
  }

  // Success
  document.getElementById('status').textContent = '✓ Mot de passe modifié avec succès !'
  document.getElementById('status').className = 'status show ok'
  document.getElementById('formContent').style.display = 'none'
  document.getElementById('cardSub').textContent = 'Vous pouvez maintenant vous connecter.'
  document.getElementById('backLink').textContent = '→ Se connecter'
  setTimeout(() => window.location.href = '/login', 2000)
}

function showError(msg) {
  const st = document.getElementById('status')
  st.textContent = msg; st.className = 'status show err'
}

// Password strength meter
function checkStrength() {
  const val = document.getElementById('pwd1').value
  const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')]
  const hint = document.getElementById('pwdHint')
  let score = 0
  if (val.length >= 8)  score++
  if (val.length >= 12) score++
  if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++
  if (/[^A-Za-z0-9]/.test(val)) score++

  const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong'
  const labels = ['', 'Faible', 'Moyen', 'Bon', 'Fort']
  const colors = { weak:'weak', medium:'medium', strong:'strong' }

  bars.forEach((b, i) => { b.className = 'pwd-bar ' + (i < score ? cls : '') })
  hint.textContent = val.length === 0 ? 'Minimum 8 caractères' : (labels[score] || 'Très fort')
  hint.style.color = score <= 1 ? 'var(--red)' : score <= 2 ? 'var(--gold)' : 'var(--green, #27ae60)'
}

function toggle(id, btn) {
  const inp = document.getElementById(id)
  inp.type = inp.type === 'password' ? 'text' : 'password'
  btn.textContent = inp.type === 'password' ? '👁' : '🙈'
}
</script>
</body>
</html>
