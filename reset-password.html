<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAR Design — Nouveau mot de passe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:#f0ede8; --ink:#111010; --mid:#888580;
  --line:rgba(17,16,16,.1); --gold:#b8945a; --red:#c0392b; --green:#27ae60;
  --E:cubic-bezier(.16,1,.3,1);
}
html,body{height:100%;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 0%,transparent 75%);}
.card{position:relative;z-index:1;width:420px;max-width:92vw;background:rgba(240,237,232,.95);border:1px solid var(--line);padding:3.25rem 3rem;box-shadow:0 24px 60px rgba(17,16,16,.07);animation:cardIn .75s var(--E) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.logo-wrap{text-align:center;margin-bottom:2.5rem;}
.logo-wrap img{height:26px;display:inline-block;}
.card-title{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;line-height:1;text-align:center;margin-bottom:.35rem;}
.card-title em{font-style:italic;color:var(--mid);}
.card-sub{font-size:.65rem;letter-spacing:.18em;color:var(--mid);text-align:center;margin-bottom:2.5rem;}
.field{margin-bottom:1.35rem;}
.field label{display:block;font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--mid);margin-bottom:.5rem;}
.field-wrap{position:relative;}
.field input{width:100%;background:rgba(17,16,16,.03);border:none;border-bottom:1px solid rgba(17,16,16,.18);color:var(--ink);padding:.8rem 2.5rem .8rem 0;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:300;outline:none;transition:border-color .25s;}
.field input:focus{border-bottom-color:var(--ink);}
.field input::placeholder{color:rgba(136,133,128,.4);}
.eye-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mid);cursor:pointer;font-size:.85rem;transition:color .2s;}
.eye-btn:hover{color:var(--ink);}
.pwd-strength{margin-top:.5rem;display:flex;gap:3px;}
.pwd-bar{flex:1;height:2px;background:var(--line);transition:background .3s;}
.pwd-bar.weak{background:var(--red);}
.pwd-bar.medium{background:var(--gold);}
.pwd-bar.strong{background:var(--green);}
.pwd-hint{font-size:.62rem;color:var(--mid);margin-top:.35rem;}
.submit-btn{width:100%;padding:1rem;margin-top:.5rem;background:var(--ink);color:var(--bg);font-family:'DM Sans',sans-serif;font-weight:300;font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;border:none;cursor:pointer;position:relative;overflow:hidden;transition:box-shadow .35s,transform .2s var(--E);}
.submit-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.06);transform:translateX(-101%);transition:transform .5s var(--E);}
.submit-btn:hover::after{transform:translateX(0);}
.submit-btn:hover{box-shadow:0 10px 32px rgba(17,16,16,.2);transform:translateY(-1px);}
.submit-btn:disabled{opacity:.45;pointer-events:none;}
.status{margin-top:1rem;padding:.65rem .9rem;font-size:.75rem;text-align:center;opacity:0;transition:opacity .3s;border-left:2px solid transparent;}
.status.show{opacity:1;}
.status.err{border-left-color:var(--red);color:var(--red);background:rgba(192,57,43,.04);}
.status.ok{border-left-color:var(--green);color:var(--green);background:rgba(39,174,96,.04);}
.back-link{display:block;text-align:center;margin-top:2rem;font-size:.65rem;letter-spacing:.14em;color:var(--mid);text-decoration:none;transition:color .2s;}
.back-link:hover{color:var(--ink);}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;}
.loading-screen img{height:28px;opacity:.5;}
.loading-bar-w{width:80px;height:1px;background:var(--line);overflow:hidden;}
.loading-bar{height:100%;background:var(--ink);animation:loadPulse 1.2s ease-in-out infinite;}
@keyframes loadPulse{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
.dots{display:inline-flex;gap:4px;vertical-align:middle;}
.dots span{width:4px;height:4px;background:currentColor;border-radius:50%;animation:dot .8s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.15s;}
.dots span:nth-child(3){animation-delay:.3s;}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <img src="assets/Logo-Aardesign-Long.png" alt="AAR Design">
  <div class="loading-bar-w"><div class="loading-bar"></div></div>
</div>

<div class="card" id="mainCard" style="display:none">
  <div class="logo-wrap">
    <img src="assets/Logo-Aardesign-Long.png" alt="AAR Design">
  </div>
  <h1 class="card-title">Nouveau <em>mot de passe</em></h1>
  <p class="card-sub" id="cardSub">Choisissez un mot de passe sécurisé</p>

  <div id="formContent">
    <div class="field">
      <label>Nouveau mot de passe</label>
      <div class="field-wrap">
        <input type="password" id="pwd1" placeholder="••••••••••••" oninput="checkStrength()">
        <button class="eye-btn" onclick="toggleEye('pwd1',this)" type="button">👁</button>
      </div>
      <div class="pwd-strength">
        <div class="pwd-bar" id="bar1"></div>
        <div class="pwd-bar" id="bar2"></div>
        <div class="pwd-bar" id="bar3"></div>
        <div class="pwd-bar" id="bar4"></div>
      </div>
      <div class="pwd-hint" id="pwdHint">Minimum 8 caractères</div>
    </div>
    <div class="field">
      <label>Confirmer</label>
      <div class="field-wrap">
        <input type="password" id="pwd2" placeholder="••••••••••••">
        <button class="eye-btn" onclick="toggleEye('pwd2',this)" type="button">👁</button>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="updatePassword()">
      <span id="btnLabel">Enregistrer →</span>
    </button>
  </div>

  <div class="status" id="status"></div>
  <a href="/login" class="back-link" id="backLink">← Retour à la connexion</a>
</div>

<script>
const SUPABASE_URL      = 'https://jknabfgvaoonscjnpgvy.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_gtJzXyp5VKKxEZNvS_mryg_S9konQR0'

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function showCard() {
  document.getElementById('loadingScreen').style.display = 'none'
  document.getElementById('mainCard').style.display = 'block'
}
function hideForm() {
  document.getElementById('formContent').style.display = 'none'
}
function showErr(msg) {
  const st = document.getElementById('status')
  st.textContent = msg; st.className = 'status show err'
}

// Supabase v2 PKCE : le lien contient ?code=XXXX
// Supabase JS le détecte automatiquement et déclenche PASSWORD_RECOVERY
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
    showCard()
  }
})

window.addEventListener('load', async () => {
  const urlParams = new URLSearchParams(window.location.search)
  const hashParams = new URLSearchParams(window.location.hash.replace('#',''))

  const hasCode  = urlParams.has('code')
  const hasToken = hashParams.has('access_token') && hashParams.get('type') === 'recovery'

  if (!hasCode && !hasToken) {
    // Aucun token → lien invalide
    showErr('Lien invalide ou expiré. Demandez un nouveau lien depuis la page de connexion.')
    hideForm()
    showCard()
    return
  }

  if (hasToken) {
    // Ancien flow hash-based
    const { error } = await sb.auth.setSession({
      access_token:  hashParams.get('access_token'),
      refresh_token: hashParams.get('refresh_token') || ''
    })
    if (error) { showErr('Lien expiré. Demandez un nouveau lien.'); hideForm() }
    showCard()
    return
  }

  // PKCE (?code=) : onAuthStateChange gère tout automatiquement
  // Timeout de sécurité si rien ne se passe
  setTimeout(() => {
    if (document.getElementById('loadingScreen').style.display !== 'none') {
      showErr('Délai dépassé. Le lien est peut-être expiré, demandez-en un nouveau.')
      hideForm()
      showCard()
    }
  }, 5000)
})

async function updatePassword() {
  const pwd1 = document.getElementById('pwd1').value
  const pwd2 = document.getElementById('pwd2').value
  const btn  = document.getElementById('submitBtn')
  const lbl  = document.getElementById('btnLabel')
  if (!pwd1 || pwd1.length < 8) { showErr('Minimum 8 caractères.'); return }
  if (pwd1 !== pwd2) { showErr('Les mots de passe ne correspondent pas.'); return }
  btn.disabled = true
  lbl.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>'
  document.getElementById('status').className = 'status'
  const { error } = await sb.auth.updateUser({ password: pwd1 })
  if (error) {
    btn.disabled = false; lbl.textContent = 'Enregistrer →'
    showErr('Erreur : ' + error.message); return
  }
  document.getElementById('status').textContent = '✓ Mot de passe modifié !'
  document.getElementById('status').className = 'status show ok'
  hideForm()
  document.getElementById('cardSub').textContent = 'Vous pouvez maintenant vous connecter.'
  setTimeout(() => window.location.href = '/login', 2000)
}

function checkStrength() {
  const v = document.getElementById('pwd1').value
  const bars = [1,2,3,4].map(i => document.getElementById('bar'+i))
  const hint = document.getElementById('pwdHint')
  let s = 0
  if (v.length >= 8) s++
  if (v.length >= 12) s++
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++
  if (/[^A-Za-z0-9]/.test(v)) s++
  const cls = s <= 1 ? 'weak' : s <= 2 ? 'medium' : 'strong'
  bars.forEach((b,i) => { b.className = 'pwd-bar ' + (i < s ? cls : '') })
  hint.textContent = v.length === 0 ? 'Minimum 8 caractères' : ['','Faible','Moyen','Bon','Fort'][s] || 'Très fort'
  hint.style.color = s <= 1 ? 'var(--red)' : s <= 2 ? 'var(--gold)' : 'var(--green)'
}

function toggleEye(id, btn) {
  const inp = document.getElementById(id)
  inp.type = inp.type === 'password' ? 'text' : 'password'
  btn.textContent = inp.type === 'password' ? '👁' : '🙈'
}
</script>
</body>
</html>
