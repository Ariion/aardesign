<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAR Design — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:   #f0ede8;
  --ink:  #111010;
  --mid:  #888580;
  --line: rgba(17,16,16,.1);
  --gold: #b8945a;
  --red:  #c0392b;
  --E:    cubic-bezier(.16,1,.3,1);
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* Subtle grid bg */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 75%);
}

/* Decorative blobs */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 50% 40% at 15% 20%, rgba(184,148,90,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 85% 80%, rgba(17,16,16,.04) 0%, transparent 55%);
}

.card {
  position: relative; z-index: 1;
  width: 420px; max-width: 92vw;
  background: rgba(240,237,232,.95);
  border: 1px solid var(--line);
  padding: 3.25rem 3rem;
  box-shadow: 0 24px 60px rgba(17,16,16,.07), 0 1px 0 rgba(255,255,255,.6) inset;
  animation: cardIn .75s var(--E) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(28px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
/* Gold top accent */
.card::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.logo-wrap { text-align: center; margin-bottom: 2.75rem; }
.logo-wrap img {
  height: 26px; display: inline-block;
  animation: logoIn .6s var(--E) .15s both;
}
@keyframes logoIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem; font-weight: 400; line-height: 1;
  color: var(--ink); text-align: center; margin-bottom: .35rem;
}
.card-title em { font-style: italic; color: var(--mid); }
.card-sub {
  font-size: .65rem; letter-spacing: .18em; color: var(--mid);
  text-align: center; margin-bottom: 2.5rem;
}

.field { margin-bottom: 1.35rem; }
.field label {
  display: block; font-size: .58rem; letter-spacing: .24em;
  text-transform: uppercase; color: var(--mid); margin-bottom: .5rem;
}
.field-wrap { position: relative; }
.field input {
  width: 100%; background: rgba(17,16,16,.03);
  border: none; border-bottom: 1px solid rgba(17,16,16,.18);
  color: var(--ink); padding: .8rem 0;
  font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 300;
  outline: none; transition: border-color .25s; border-radius: 0;
}
.field input:focus { border-bottom-color: var(--ink); }
.field input::placeholder { color: rgba(136,133,128,.4); }
.eye-btn {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--mid); cursor: pointer;
  font-size: .85rem; transition: color .2s; padding: .25rem;
}
.eye-btn:hover { color: var(--ink); }

.submit-btn {
  width: 100%; padding: 1rem; margin-top: .5rem;
  background: var(--ink); color: var(--bg);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  font-size: .7rem; letter-spacing: .24em; text-transform: uppercase;
  border: none; cursor: pointer; position: relative; overflow: hidden;
  transition: box-shadow .35s, transform .2s var(--E);
}
.submit-btn::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,.06);
  transform: translateX(-101%); transition: transform .5s var(--E);
}
.submit-btn:hover::after { transform: translateX(0); }
.submit-btn:hover { box-shadow: 0 10px 32px rgba(17,16,16,.2); transform: translateY(-1px); }
.submit-btn.loading { pointer-events: none; opacity: .65; }

.status {
  margin-top: 1rem; padding: .65rem .9rem;
  font-size: .75rem; text-align: center;
  opacity: 0; transition: opacity .3s; border-left: 2px solid transparent;
}
.status.show { opacity: 1; }
.status.err  { border-left-color: var(--red); color: var(--red); background: rgba(192,57,43,.04); }
.status.ok   { border-left-color: #27ae60; color: #27ae60; background: rgba(39,174,96,.04); }

.back-link {
  display: block; text-align: center; margin-top: 2rem;
  font-size: .65rem; letter-spacing: .14em; color: var(--mid);
  text-decoration: none; transition: color .2s;
}
.back-link:hover { color: var(--ink); }
.back-link::before { content: '← '; }

.dots { display: inline-flex; gap: 4px; vertical-align: middle; }
.dots span { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: dot .8s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .3s; }
@keyframes dot { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="assets/Logo-Aardesign-Long.png" alt="AAR Design">
  </div>
  <h1 class="card-title">Espace <em>admin</em></h1>
  <p class="card-sub">Connexion sécurisée — accès réservé</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="aardesign14@gmail.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Mot de passe</label>
    <div class="field-wrap">
      <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
      <button class="eye-btn" id="eyeBtn" onclick="togglePwd()" type="button">👁</button>
    </div>
  </div>

  <button class="submit-btn" id="loginBtn" onclick="doLogin()">
    <span id="btnLabel">Se connecter →</span>
  </button>
  <div class="status" id="status"></div>

  <div style="text-align:center;margin-top:1.25rem">
    <button onclick="toggleReset()" id="forgotBtn"
      style="background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.65rem;letter-spacing:.12em;color:var(--mid);transition:color .2s;text-decoration:underline;text-underline-offset:3px">
      Mot de passe oublié ?
    </button>
  </div>

  <!-- Reset form (hidden by default) -->
  <div id="resetBox" style="display:none;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--line)">
    <p style="font-size:.65rem;letter-spacing:.14em;color:var(--mid);text-align:center;margin-bottom:1.25rem">Entrez votre email pour recevoir un lien</p>
    <div class="field" style="margin-bottom:.75rem">
      <label>Email</label>
      <input type="email" id="resetEmail" placeholder="aardesign14@gmail.com">
    </div>
    <button class="submit-btn" id="resetBtn" onclick="sendReset()">
      <span id="resetLabel">Envoyer le lien →</span>
    </button>
    <div class="status" id="resetStatus"></div>
  </div>

  <a href="/" class="back-link">← Retour au portfolio</a>
</div>

<script>
const SUPABASE_URL      = 'https://XXXXXXXXXXXXXXXX.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

sb.auth.getSession().then(({ data }) => { if (data.session) window.location.href = '/admin' })

async function doLogin() {
  const email = document.getElementById('email').value.trim()
  const pwd   = document.getElementById('password').value
  const btn   = document.getElementById('loginBtn')
  const lbl   = document.getElementById('btnLabel')
  if (!email || !pwd) { showStatus('Veuillez remplir tous les champs.', 'err'); return }
  btn.classList.add('loading')
  lbl.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>'
  document.getElementById('status').className = 'status'
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd })
  if (error) {
    btn.classList.remove('loading'); lbl.textContent = 'Se connecter →'
    showStatus('Email ou mot de passe incorrect.', 'err'); return
  }
  showStatus('Connexion réussie — redirection…', 'ok')
  setTimeout(() => window.location.href = '/admin', 800)
}
function showStatus(msg, type) {
  const st = document.getElementById('status')
  st.textContent = msg; st.className = 'status show ' + type
}
function toggleReset() {
  const box = document.getElementById('resetBox')
  const btn = document.getElementById('forgotBtn')
  const open = box.style.display === 'none'
  box.style.display = open ? 'block' : 'none'
  btn.textContent = open ? 'Annuler' : 'Mot de passe oublié ?'
  if (open) {
    // Pré-remplir avec l'email saisi
    const email = document.getElementById('email').value.trim()
    if (email) document.getElementById('resetEmail').value = email
  }
}

async function sendReset() {
  const email = document.getElementById('resetEmail').value.trim()
  const btn   = document.getElementById('resetBtn')
  const lbl   = document.getElementById('resetLabel')
  const st    = document.getElementById('resetStatus')
  if (!email) { showResetStatus('Entrez votre adresse email.', 'err'); return }
  btn.disabled = true
  lbl.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>'
  st.className = 'status'
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password'
  })
  btn.disabled = false; lbl.textContent = 'Envoyer le lien →'
  if (error) { showResetStatus('Erreur : ' + error.message, 'err'); return }
  showResetStatus('✓ Email envoyé ! Vérifiez votre boîte mail.', 'ok')
  document.getElementById('resetBtn').style.display = 'none'
}

function showResetStatus(msg, type) {
  const st = document.getElementById('resetStatus')
  st.textContent = msg; st.className = 'status show ' + type
}
function togglePwd() {
  const inp = document.getElementById('password'), btn = document.getElementById('eyeBtn')
  inp.type = inp.type === 'password' ? 'text' : 'password'
  btn.textContent = inp.type === 'password' ? '👁' : '🙈'
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
</script>
</body>
</html>
